<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MixedPrecisionNanny - Precision Diff Visualization</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d2e;
  --bg-card: #222640;
  --border: #2d3154;
  --text-primary: #e6e8f0;
  --text-secondary: #8b8fa8;
  --accent-blue: #5b8def;
  --accent-green: #4cd97b;
  --accent-orange: #f5a623;
  --accent-red: #ef5b5b;
  --accent-purple: #a78bfa;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
}

.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.header h1 span { color: var(--accent-blue); }

.header-actions {
  display: flex;
  gap: 12px;
  align-items: center;
}

.header-actions select, .header-actions button {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.2s;
}

.header-actions select:hover, .header-actions button:hover {
  border-color: var(--accent-blue);
}

.container { max-width: 1440px; margin: 0 auto; padding: 24px 32px; }

.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.summary-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  text-align: center;
}

.summary-card .label {
  font-size: 12px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.summary-card .value {
  font-size: 28px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.summary-card .sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.value.good { color: var(--accent-green); }
.value.warn { color: var(--accent-orange); }
.value.bad  { color: var(--accent-red); }

.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
}

.chart-card.full { grid-column: 1 / -1; }

.chart-card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-secondary);
}

.chart-container { width: 100%; height: 380px; }
.chart-container.tall { height: 500px; }

.table-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 24px;
}

.table-section h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-secondary);
}

.table-toolbar {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
  align-items: center;
}

.table-toolbar input {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  flex: 1;
  max-width: 360px;
}

.table-toolbar .sort-btn {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.table-toolbar .sort-btn.active {
  color: var(--accent-blue);
  border-color: var(--accent-blue);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 2px solid var(--border);
  color: var(--text-secondary);
  font-weight: 500;
  font-size: 12px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}

th:hover { color: var(--accent-blue); }
th .arrow { font-size: 10px; margin-left: 4px; }

td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
}

tr:hover td { background: rgba(91, 141, 239, 0.05); }

.layer-name {
  max-width: 240px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  font-size: 12px;
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
}

.badge-good { background: rgba(76, 217, 123, 0.15); color: var(--accent-green); }
.badge-warn { background: rgba(245, 166, 35, 0.15); color: var(--accent-orange); }
.badge-bad  { background: rgba(239, 91, 91, 0.15); color: var(--accent-red); }

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60vh;
  font-size: 16px;
  color: var(--text-secondary);
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.empty-state h2 { font-size: 20px; margin-bottom: 12px; color: var(--text-primary); }
.empty-state p { font-size: 14px; max-width: 480px; margin: 0 auto; }

@media (max-width: 900px) {
  .chart-row { grid-template-columns: 1fr; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .container { padding: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>MixedPrecision</span>Nanny &mdash; Precision Diff</h1>
  <div class="header-actions">
    <select id="reportSelect">
      <option value="current">Current Report</option>
    </select>
    <button onclick="loadReport()">Reload</button>
  </div>
</div>

<div class="container" id="app">
  <div class="loading" id="loadingState">Loading report...</div>
</div>

<script>
const $ = s => document.querySelector(s);
let reportData = null;
let sortCol = 'mean_abs_diff';
let sortAsc = false;
let filterText = '';

async function fetchReports() {
  try {
    const res = await fetch('/api/reports');
    const list = await res.json();
    const sel = $('#reportSelect');
    list.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.id;
      opt.textContent = `${r.model_name} (${r.precision}) - ${new Date(r.timestamp * 1000).toLocaleString()}`;
      sel.appendChild(opt);
    });
  } catch (e) { /* ignore */ }
}

async function loadReport(id) {
  id = id || $('#reportSelect').value || 'current';
  try {
    const res = await fetch(`/api/report/${id}`);
    if (!res.ok) throw new Error('Not found');
    reportData = await res.json();
    render();
  } catch (e) {
    $('#app').innerHTML = `
      <div class="empty-state">
        <h2>No Report Available</h2>
        <p>Run a precision diff analysis first, then start the server with the report path.
        See examples/compare_precision.py for usage.</p>
      </div>`;
  }
}

function fmtSci(v, digits) {
  if (v === undefined || v === null || isNaN(v)) return '-';
  digits = digits || 4;
  if (Math.abs(v) < 0.001 || Math.abs(v) >= 10000) return v.toExponential(digits);
  return v.toPrecision(digits + 1);
}

function cosClass(v) {
  if (v >= 0.9999) return 'good';
  if (v >= 0.999) return 'warn';
  return 'bad';
}

function diffClass(v, threshold_warn, threshold_bad) {
  threshold_warn = threshold_warn || 1e-3;
  threshold_bad = threshold_bad || 1e-1;
  if (v <= threshold_warn) return 'good';
  if (v <= threshold_bad) return 'warn';
  return 'bad';
}

function badgeHtml(cls, text) {
  return `<span class="badge badge-${cls}">${text}</span>`;
}

function render() {
  if (!reportData) return;
  const d = reportData;
  const layers = d.layers || [];

  const ts = new Date(d.timestamp * 1000).toLocaleString();
  const avgCos = layers.length
    ? layers.reduce((s, l) => s + l.cosine_similarity, 0) / layers.length
    : 0;
  const maxDiffLayer = layers.length
    ? layers.reduce((m, l) => l.max_abs_diff > m.max_abs_diff ? l : m, layers[0])
    : null;
  const nanLayers = layers.filter(l => l.mp_nan_count > 0).length;
  const infLayers = layers.filter(l => l.mp_inf_count > 0).length;

  let html = `
    <div style="margin-bottom:20px; color:var(--text-secondary); font-size:13px;">
      Model: <strong style="color:var(--text-primary)">${d.model_name}</strong>
      &nbsp;|&nbsp; Precision: <strong style="color:var(--accent-blue)">${d.precision.toUpperCase()}</strong>
      &nbsp;|&nbsp; Device: ${d.device}
      &nbsp;|&nbsp; Input: [${d.input_shape.join(', ')}]
      &nbsp;|&nbsp; Time: ${ts}
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="label">Total Layers</div>
        <div class="value">${d.total_layers}</div>
      </div>
      <div class="summary-card">
        <div class="label">Final Output Cosine Sim</div>
        <div class="value ${cosClass(d.final_output_cosine_similarity)}">${d.final_output_cosine_similarity.toFixed(6)}</div>
      </div>
      <div class="summary-card">
        <div class="label">Final Max Abs Diff</div>
        <div class="value ${diffClass(d.final_output_max_abs_diff)}">${fmtSci(d.final_output_max_abs_diff)}</div>
      </div>
      <div class="summary-card">
        <div class="label">Avg Layer Cosine Sim</div>
        <div class="value ${cosClass(avgCos)}">${avgCos.toFixed(6)}</div>
      </div>
      <div class="summary-card">
        <div class="label">Worst Layer Max Diff</div>
        <div class="value ${diffClass(maxDiffLayer?.max_abs_diff || 0)}">${fmtSci(maxDiffLayer?.max_abs_diff)}</div>
        <div class="sub">${maxDiffLayer?.layer_name || '-'}</div>
      </div>
      <div class="summary-card">
        <div class="label">NaN / Inf Layers</div>
        <div class="value ${nanLayers + infLayers > 0 ? 'bad' : 'good'}">${nanLayers} / ${infLayers}</div>
      </div>
    </div>

    <div class="chart-row">
      <div class="chart-card full">
        <h3>Per-Layer Mean Absolute Diff (log scale)</h3>
        <div class="chart-container tall" id="chartMeanDiff"></div>
      </div>
    </div>

    <div class="chart-row">
      <div class="chart-card">
        <h3>Per-Layer Cosine Similarity</h3>
        <div class="chart-container" id="chartCosine"></div>
      </div>
      <div class="chart-card">
        <h3>Per-Layer RMSE</h3>
        <div class="chart-container" id="chartRmse"></div>
      </div>
    </div>

    <div class="chart-row">
      <div class="chart-card">
        <h3>Max Relative Diff Distribution</h3>
        <div class="chart-container" id="chartRelHist"></div>
      </div>
      <div class="chart-card">
        <h3>FP32 vs MP Mean Value</h3>
        <div class="chart-container" id="chartMeanCompare"></div>
      </div>
    </div>

    <div class="table-section">
      <h3>Layer Details</h3>
      <div class="table-toolbar">
        <input type="text" id="filterInput" placeholder="Filter by layer name..." oninput="onFilter(this.value)">
        <span class="sort-btn ${sortCol==='mean_abs_diff'?'active':''}" onclick="setSort('mean_abs_diff')">Sort: Mean Diff</span>
        <span class="sort-btn ${sortCol==='cosine_similarity'?'active':''}" onclick="setSort('cosine_similarity')">Sort: Cosine</span>
        <span class="sort-btn ${sortCol==='max_abs_diff'?'active':''}" onclick="setSort('max_abs_diff')">Sort: Max Diff</span>
        <span class="sort-btn ${sortCol==='rmse'?'active':''}" onclick="setSort('rmse')">Sort: RMSE</span>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th onclick="toggleSort('layer_name')">Layer <span class="arrow"></span></th>
              <th onclick="toggleSort('layer_type')">Type</th>
              <th onclick="toggleSort('mp_dtype')">MP Dtype</th>
              <th onclick="toggleSort('cosine_similarity')">Cosine Sim</th>
              <th onclick="toggleSort('max_abs_diff')">Max Abs Diff</th>
              <th onclick="toggleSort('mean_abs_diff')">Mean Abs Diff</th>
              <th onclick="toggleSort('max_rel_diff')">Max Rel Diff</th>
              <th onclick="toggleSort('mean_rel_diff')">Mean Rel Diff</th>
              <th onclick="toggleSort('rmse')">RMSE</th>
              <th>Shape</th>
            </tr>
          </thead>
          <tbody id="layerTableBody"></tbody>
        </table>
      </div>
    </div>`;

  $('#app').innerHTML = html;
  renderTable();
  renderCharts();
}

function getFilteredSorted() {
  let layers = (reportData?.layers || []).slice();
  if (filterText) {
    const ft = filterText.toLowerCase();
    layers = layers.filter(l => l.layer_name.toLowerCase().includes(ft) || l.layer_type.toLowerCase().includes(ft));
  }
  layers.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
  return layers;
}

function renderTable() {
  const layers = getFilteredSorted();
  const tbody = $('#layerTableBody');
  if (!tbody) return;
  tbody.innerHTML = layers.map(l => `<tr>
    <td class="layer-name" title="${l.layer_name}">${l.layer_name}</td>
    <td>${l.layer_type}</td>
    <td>${l.mp_dtype.replace('torch.', '')}</td>
    <td>${badgeHtml(cosClass(l.cosine_similarity), l.cosine_similarity.toFixed(6))}</td>
    <td>${fmtSci(l.max_abs_diff)}</td>
    <td>${fmtSci(l.mean_abs_diff)}</td>
    <td>${fmtSci(l.max_rel_diff)}</td>
    <td>${fmtSci(l.mean_rel_diff)}</td>
    <td>${fmtSci(l.rmse)}</td>
    <td style="font-size:11px;color:var(--text-secondary)">[${l.shape.join(',')}]</td>
  </tr>`).join('');
}

function onFilter(v) { filterText = v; renderTable(); }
function setSort(col) { if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = false; } render(); }
function toggleSort(col) { setSort(col); }

function truncLabel(s, max) {
  max = max || 20;
  if (s.length <= max) return s;
  return '...' + s.slice(-(max - 3));
}

function renderCharts() {
  const layers = reportData?.layers || [];
  if (!layers.length) return;

  const names = layers.map(l => l.layer_name);
  const shortNames = names.map(n => truncLabel(n, 24));

  // Mean Abs Diff bar chart (log scale)
  const chartMean = echarts.init($('#chartMeanDiff'));
  chartMean.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' },
      formatter: p => `${names[p[0].dataIndex]}<br/>Mean Abs Diff: ${fmtSci(p[0].value)}` },
    grid: { left: 80, right: 30, top: 20, bottom: 80 },
    xAxis: { type: 'category', data: shortNames,
      axisLabel: { rotate: 45, fontSize: 10, color: '#8b8fa8', interval: Math.max(0, Math.floor(layers.length / 40) - 1) } },
    yAxis: { type: 'log', name: 'Mean Abs Diff', axisLabel: { color: '#8b8fa8' }, splitLine: { lineStyle: { color: '#2d3154' } } },
    series: [{
      type: 'bar', data: layers.map(l => l.mean_abs_diff),
      itemStyle: {
        color: p => {
          const v = p.value;
          if (v <= 1e-5) return '#4cd97b';
          if (v <= 1e-2) return '#f5a623';
          return '#ef5b5b';
        }
      }
    }],
    dataZoom: [{ type: 'inside' }, { type: 'slider', height: 20, bottom: 5 }],
  });

  // Cosine similarity
  const chartCos = echarts.init($('#chartCosine'));
  chartCos.setOption({
    tooltip: { trigger: 'axis',
      formatter: p => `${names[p[0].dataIndex]}<br/>Cosine: ${p[0].value.toFixed(8)}` },
    grid: { left: 80, right: 20, top: 20, bottom: 60 },
    xAxis: { type: 'category', data: shortNames,
      axisLabel: { rotate: 45, fontSize: 9, color: '#8b8fa8', interval: Math.max(0, Math.floor(layers.length / 20) - 1) } },
    yAxis: { type: 'value', min: function(v) { return Math.max(0, v.min - 0.001); }, max: 1,
      axisLabel: { color: '#8b8fa8' }, splitLine: { lineStyle: { color: '#2d3154' } } },
    series: [{
      type: 'line', data: layers.map(l => l.cosine_similarity), smooth: true,
      lineStyle: { color: '#5b8def', width: 2 },
      areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
        colorStops: [{ offset: 0, color: 'rgba(91,141,239,0.25)' }, { offset: 1, color: 'rgba(91,141,239,0)' }] } },
      itemStyle: { color: '#5b8def' }, symbol: layers.length > 50 ? 'none' : 'circle', symbolSize: 4,
    }],
    dataZoom: [{ type: 'inside' }],
  });

  // RMSE
  const chartRmse = echarts.init($('#chartRmse'));
  chartRmse.setOption({
    tooltip: { trigger: 'axis',
      formatter: p => `${names[p[0].dataIndex]}<br/>RMSE: ${fmtSci(p[0].value)}` },
    grid: { left: 80, right: 20, top: 20, bottom: 60 },
    xAxis: { type: 'category', data: shortNames,
      axisLabel: { rotate: 45, fontSize: 9, color: '#8b8fa8', interval: Math.max(0, Math.floor(layers.length / 20) - 1) } },
    yAxis: { type: 'log', axisLabel: { color: '#8b8fa8' }, splitLine: { lineStyle: { color: '#2d3154' } } },
    series: [{
      type: 'bar', data: layers.map(l => l.rmse),
      itemStyle: { color: '#a78bfa' },
    }],
    dataZoom: [{ type: 'inside' }],
  });

  // Max Relative Diff histogram
  const chartRelHist = echarts.init($('#chartRelHist'));
  const relDiffs = layers.map(l => l.max_rel_diff).filter(v => isFinite(v));
  const logBins = [-8, -6, -4, -3, -2, -1, 0, 1, 2, 4];
  const binLabels = logBins.slice(0, -1).map((b, i) => `1e${b}~1e${logBins[i+1]}`);
  const binCounts = new Array(logBins.length - 1).fill(0);
  relDiffs.forEach(v => {
    const lv = Math.log10(Math.max(v, 1e-12));
    for (let i = 0; i < logBins.length - 1; i++) {
      if (lv >= logBins[i] && lv < logBins[i + 1]) { binCounts[i]++; break; }
    }
  });
  chartRelHist.setOption({
    tooltip: { trigger: 'axis' },
    grid: { left: 50, right: 20, top: 20, bottom: 50 },
    xAxis: { type: 'category', data: binLabels, axisLabel: { rotate: 30, fontSize: 10, color: '#8b8fa8' } },
    yAxis: { type: 'value', axisLabel: { color: '#8b8fa8' }, splitLine: { lineStyle: { color: '#2d3154' } } },
    series: [{
      type: 'bar', data: binCounts,
      itemStyle: { color: '#f5a623', borderRadius: [4, 4, 0, 0] },
    }],
  });

  // FP32 vs MP mean comparison
  const chartMeanCmp = echarts.init($('#chartMeanCompare'));
  chartMeanCmp.setOption({
    tooltip: { trigger: 'axis',
      formatter: p => `${names[p[0].dataIndex]}<br/>FP32 Mean: ${fmtSci(p[0].value)}<br/>MP Mean: ${fmtSci(p[1].value)}` },
    legend: { data: ['FP32 Mean', 'MP Mean'], textStyle: { color: '#8b8fa8' }, top: 0 },
    grid: { left: 80, right: 20, top: 30, bottom: 60 },
    xAxis: { type: 'category', data: shortNames,
      axisLabel: { rotate: 45, fontSize: 9, color: '#8b8fa8', interval: Math.max(0, Math.floor(layers.length / 20) - 1) } },
    yAxis: { type: 'value', axisLabel: { color: '#8b8fa8' }, splitLine: { lineStyle: { color: '#2d3154' } } },
    series: [
      { name: 'FP32 Mean', type: 'line', data: layers.map(l => l.fp32_mean), lineStyle: { color: '#4cd97b' }, itemStyle: { color: '#4cd97b' }, symbol: layers.length > 50 ? 'none' : 'circle', symbolSize: 3 },
      { name: 'MP Mean', type: 'line', data: layers.map(l => l.mp_mean), lineStyle: { color: '#ef5b5b', type: 'dashed' }, itemStyle: { color: '#ef5b5b' }, symbol: layers.length > 50 ? 'none' : 'circle', symbolSize: 3 },
    ],
    dataZoom: [{ type: 'inside' }],
  });

  window.addEventListener('resize', () => {
    [chartMean, chartCos, chartRmse, chartRelHist, chartMeanCmp].forEach(c => c.resize());
  });
}

$('#reportSelect').addEventListener('change', e => loadReport(e.target.value));

fetchReports();
loadReport('current');
</script>
</body>
</html>
